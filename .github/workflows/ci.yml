name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'
    
    - name: List files (debug)
      run: ls -la
    
    - name: Find csproj file
      run: |
        echo "Looking for .csproj file..."
        find . -name "*.csproj"
    
    - name: Restore dependencies
      run: dotnet restore CybersecurityChatbot/CybersecurityChatbot.csproj
    
    - name: Build
      run: dotnet build CybersecurityChatbot/CybersecurityChatbot.csproj --no-restore --configuration Release
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test --no-build --verbosity normal
